<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>AR Scanner - Nittaya Panich</title>
    
    <!-- โหลด Library A-Frame และ Mind-AR -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* หน้าจอ Loading ระหว่างรอระบบพร้อม */
      #scanning-overlay {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        color: white;
        z-index: 99;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .hidden { display: none !important; }

      /* กรอบจำลองการสแกน */
      .scanner-frame {
        width: 70vw;
        height: 70vw;
        border: 2px solid #00ff00;
        box-shadow: 0 0 15px #00ff00;
        position: relative;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>

    <!-- หน้าจอแสดงตอนเริ่มระบบ -->
    <div id="scanning-overlay">
      <div class="scanner-frame"></div>
      <p>กำลังเปิดกล้องและโหลดไฟล์ AR...</p>
      <small>กรุณากด Allow หากเบราว์เซอร์ขอสิทธิ์ใช้กล้อง</small>
    </div>

    <!-- 
      - imageTargetSrc: ไฟล์ .mind จาก GitHub ของคุณ
      - uiScanning: กำหนดให้ใช้ overlay ที่เราสร้างเอง
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- โหลดรูปภาพที่จะให้เด้งขึ้นมา -->
        <img id="myImage" src="./1000026248.jpg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 
        targetIndex: 0 คือรูปแรกที่อยู่ในไฟล์ .mind
      -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 
          แสดงรูปภาพแทนโมเดล 3D 
          - width/height: ปรับขนาดแผ่นภาพ
          - position: 0 0 0.1 (ลอยออกมาจากพื้นผิวเล็กน้อย)
        -->
        <a-image 
          src="#myImage" 
          position="0 0 0.1" 
          width="1" 
          height="1" 
          animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; easing: easeOutElastic">
        </a-image>
      </a-entity>

    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.querySelector('#scanning-overlay');

      // เมื่อระบบ AR พร้อมใช้งาน ให้ซ่อนหน้า Loading
      sceneEl.addEventListener("arReady", (event) => {
        console.log("MindAR is ready");
        // เราจะซ่อน overlay เมื่อสแกนติด หรือจะซ่อนทันทีที่กล้องมาก็ได้
        // ในที่นี้ให้ซ่อนทันทีที่กล้องทำงานสำเร็จ
        overlay.classList.add('hidden');
      });

      // ตรวจจับเหตุการณ์สแกนเจอ/หาย
      const targetEl = document.querySelector('[mindar-image-target]');
      targetEl.addEventListener("targetFound", event => {
        console.log("พบวัตถุเป้าหมาย!");
      });

      targetEl.addEventListener("targetLost", event => {
        console.log("เป้าหมายหลุดจากกล้อง");
      });

      // ดักจับ Error กรณีกล้องมีปัญหา
      sceneEl.addEventListener("arError", (event) => {
        overlay.innerHTML = "<h3>ไม่สามารถเข้าถึงกล้องได้</h3><p>กรุณาตรวจสอบว่าคุณเปิดผ่าน Safari/Chrome และใช้ HTTPS</p>";
      });
    </script>
  </body>
</html>
